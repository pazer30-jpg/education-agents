<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627">
  <defs>
    <radialGradient id="bgGrad" cx="35%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#16213E"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </radialGradient>
    <radialGradient id="warmCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5A623" stop-opacity="0.35"/>
      <stop offset="45%" stop-color="#E94560" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#1A1A2E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tealHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0F9B8E" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#0F9B8E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="figOrange" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#E94560"/>
    </radialGradient>
    <radialGradient id="figTeal" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0F9B8E"/>
      <stop offset="100%" stop-color="#16213E"/>
    </radialGradient>
    <linearGradient id="bridgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F5A623" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#EAEAEA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0F9B8E" stop-opacity="0.9"/>
